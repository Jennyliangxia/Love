<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>何苏桓：送给你的专属心意</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* 初始背景图 */
            background: #000 url('Figure1.jpg') no-repeat center center fixed; 
            background-size: cover;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-image 1s ease-in-out; /* 背景切换平滑 */
        }
        
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); 
            z-index: 1;
        }

        #container {
            text-align: center;
            z-index: 2;
            padding: 40px;
            background: rgba(255, 255, 255, 0.85); 
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 80%;
            max-width: 500px;
            min-height: 200px; /* 固定最小高度，防止容器随文字跳动 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            position: relative;
        }

        h1 { 
            color: #d63384; 
            font-size: 22px; 
            margin: 0;
            transition: opacity 0.5s ease;
        }

        /* 优化文字样式：初始透明度为0 */
        .text { 
            color: #333; 
            line-height: 1.8; 
            font-size: 19px; 
            font-weight: 500;
            position: absolute; /* 使用绝对定位，防止切换时占位闪动 */
            opacity: 0;
            transition: opacity 0.8s ease-in-out; 
            width: 85%;
            pointer-events: none; /* 防止遮挡按钮 */
            display: none; /* 初始不占位 */
        }

        /* 激活状态：透明度变为1 */
        .text.active {
            display: block;
            position: relative; /* 激活时回到正常流，保持容器高度 */
            opacity: 1;
            pointer-events: auto;
        }

        button {
            background: #ff75a0; 
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 30px;
            z-index: 3;
            box-shadow: 0 4px 15px rgba(255, 117, 160, 0.3);
            transition: transform 0.2s, background 0.3s;
        }
        
        button:active { transform: scale(0.95); }

        .petal {
            position: absolute;
            top: -50px;
            z-index: 4;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(100px) rotate(360deg); opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div id="container">
    <h1 id="title">何苏桓，我有话想对你说... ❤️</h1>
    
    <p class="text">其实，我喜欢你很久了。<br>最初的时候，我对你只是有一点点好感。</p>
    <p class="text">你记得那天晚上吗？<br>我们两个都是残血，我被诸葛亮的大招锁定了...</p>
    <p class="text">其实我已经做好等死的准备了，<br>因为我平常都被你卖习惯了，哈哈。</p>
    <p class="text">但我真的没想到，你会突然闪现上来帮我挡住那个大招。</p>
    <p class="text">当时心里面既震惊又感动。<br>也就是那一刻，我发现自己真的好喜欢你。</p>
    <p class="text">我想表现得明显一点，又害怕被你发现而克制。<br>虽然在一起的时间不一定全是美好的，但大多数时候我都很开心。</p>
    <p class="text">因为我喜欢你吖~<br>如果你不接受，可以直接告诉我，我不是玻璃心哦。</p>
    <p class="text" style="font-weight: bold; color: #d63384; font-size: 21px;">
        林星佑 真的很喜欢 何苏桓。<br><br>你愿意做我的男朋友吗？
    </p>

    <button id="nextBtn" onclick="nextStep()">点击开启</button>
</div>

<script>
    let currentStep = 0;
    const texts = document.querySelectorAll('.text');
    const btn = document.getElementById('nextBtn');
    const title = document.getElementById('title');
    
    const bgImages = [
        'Figure1.jpg', 'Figure2.jpg', 'Figure3.jpg', 'Figure4.jpg', 
        'Figure5.jpg', 'Figure6.jpg', 'Figure7.jpg', 'Figure1.jpg'
    ];

    // 预加载图片，防止切换时出现白色闪烁
    bgImages.forEach(src => {
        const img = new Image();
        img.src = src;
    });

    function nextStep() {
        // 1. 先淡出当前的文字/标题
        if (currentStep === 0) {
            title.style.opacity = '0';
            setTimeout(() => { title.style.display = 'none'; }, 500);
        } else {
            const prevText = texts[currentStep - 1];
            prevText.classList.remove('active');
            setTimeout(() => { prevText.style.display = 'none'; }, 500);
        }

        // 2. 等待淡出效果的一半，再切换背景和淡入新文字
        setTimeout(() => {
            if (currentStep < texts.length) {
                const curText = texts[currentStep];
                // 切换背景
                document.body.style.backgroundImage = "url('" + bgImages[currentStep] + "')";
                
                // 显示并淡入新文字
                curText.style.display = 'block';
                // 稍微延迟确保display:block生效后再加active类触发opacity过渡
                setTimeout(() => { curText.classList.add('active'); }, 50);

                // 更新按钮文字
                if (currentStep === texts.length - 1) {
                    btn.innerText = "这是我的心里话";
                } else {
                    btn.innerText = "继续读下去";
                }
                currentStep++;
            } else {
                btn.style.opacity = '0';
                setTimeout(() => { btn.style.display = 'none'; }, 500);
                alert("林星佑的告白发送完毕，期待你的回答 ❤️");
            }
        }, 500);
    }

    const petalEmoji = ['🌸', '🌹', '💮', '🍀']; 
    function createPetal() {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        petal.innerHTML = petalEmoji[Math.floor(Math.random() * petalEmoji.length)];
        petal.style.left = Math.random() * 100 + 'vw'; 
        petal.style.fontSize = Math.random() * 15 + 15 + 'px'; 
        petal.style.animationDuration = Math.random() * 5 + 5 + 's'; 
        petal.style.opacity = Math.random() * 0.5 + 0.5; 
        document.body.appendChild(petal);
        setTimeout(() => { petal.remove(); }, 10000);
    }
    setInterval(createPetal, 400);
</script>

</body>
</html>
